<!-- dashboard.html — versão com identificação do usuário -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Plataforma Estatística</title>

  <!-- BIBLIOTECAS EXTERNAS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ESTILOS EXTERNOS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/popup.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/quiz_modal.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/componentes.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/introducao-teorica.css') }}">


  <!-- SCRIPTS DA PLATAFORMA -->
  <script src="/static/js/sugestoes-testes.js"></script>
  <script src="{{ url_for('static', filename='js/normalidade_grafico.js') }}"></script>
  <script src="{{ url_for('static', filename='js/quiz_modal.js') }}"></script>
  <script src="{{ url_for('static', filename='js/teste_normalidade.js') }}"></script>
  <script src="{{ url_for('static', filename='js/quadrantes_testes.js') }}"></script>
  <script src="{{ url_for('static', filename='js/popup_util.js') }}"></script>
  <script src="{{ url_for('static', filename='js/boas_vindas.js') }}"></script>
  <!-- carregado na hora do HTML -->
  <script type="module"
          src="{{ url_for('static', filename='js/introducao-teorica.js') }}">
  </script>
</head>

<!-- user_id e username expostos para JS -->
<body data-user-id="{{ user_id }}" data-username="{{ username }}">

  <!-- CABEÇALHO -->
  <header style="background:#1e88e5;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:0 1.5rem;height:100px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <img src="/static/img/logo.png" alt="Logo" style="height:70px;width:auto;">
      <div>
        <h1 style="margin:0;font-size:1.35rem;line-height:1.15;">Laboratório Virtual de Pesquisa em Simulação</h1>
        <p style="margin:0;font-size:.9rem;font-style:italic;">Métricas que impulsionam a pesquisa em simulação</p>
      </div>
    </div>

    <!-- Mensagem personalizada -->
    <div style="margin-right:1rem;font-size:.9rem;">
      Logado como: <strong>{{ username }}</strong>
    </div>

    <nav style="display:flex;gap:1.5rem;">
      <a id="logoutLink" href="#" style="color:#fff;text-decoration:none;font-weight:bold;">Sair</a>
    </nav>
  </header>

  <!-- CONTAINER GERAL -->
  <div class="dashboard-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <button onclick="carregarIntroducaoTeorica()"> 📖 Introdução Teórica </button>
      <button onclick="carregarQuizModal()"        title="Responda perguntas e receba a sugestão do teste estatístico ideal.">🛠️ Ferramenta de Seleção de Teste</button>
      <button onclick="carregarTestes()"           title="Veja os testes disponíveis, com exemplos e planilhas para download.">📊 Exemplos Práticos e Planilhas</button>
      <button onclick="carregarTesteNormalidade()" title="Verifique se seus dados seguem uma distribuição normal antes de escolher o teste.">📈 Testes de Normalidade</button>
      <button title="Inicie um novo estudo e registre suas análises.">📊 Nova Análise</button>
      <button title="Acesse os estudos que você já iniciou ou salvou anteriormente.">📁 Minhas Análises</button>
      <button title="Acesse tutoriais, vídeos e ajuda para usar a plataforma.">❓ Ajuda</button>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div class="main-panel">
      <div id="testes-container" class="testes-lista"></div>
    </div>
  </div>

  <!-- POP-UP GENÉRICO -->
  <div class="overlay" id="overlay"></div>
  <div class="popup" id="popup">
    <button class="close-btn" onclick="fecharPopup()">X</button>
    <div id="popup-content"></div>
  </div>

  <!-- RODAPÉ -->
  <footer>
    <p>&copy; 2025 Laboratório Virtual de Pesquisa em Simulação – Todos os direitos reservados.</p>
  </footer>

  <!-- ALERTA OPCIONAL -->
  <script>
    window.addEventListener('load', () => {
      if (typeof sugestoesTestes === 'undefined') {
        console.warn('Arquivo sugestoes-testes.js não carregado.');
      }
    });
  </script>

  <!-- AUTH.JS (logout via fetch) -->
  <script type="module">
    import { attachLogout } from "/static/js/auth.js";
    attachLogout();
  </script>
</body>
</html>
